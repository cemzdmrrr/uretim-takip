name: "uretim_takip"
description: "TexPilot - Tekstil Üretim Yönetim Sistemi"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_file_dialog: ^3.0.0
  file_picker: ^8.0.0+1
  excel: ^2.1.0
  path_provider: ^2.1.1
  intl: ^0.20.2
  supabase_flutter: ^2.0.0
  cupertino_icons: ^1.0.8
  step_progress_indicator: ^1.0.2
  permission_handler: ^11.0.1
  pdf: ^3.11.3
  open_file: ^3.3.2
  fl_chart: ^0.65.0
  shared_preferences: ^2.3.2
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.1.2
  file_saver: ^0.2.14
  window_manager: ^0.3.7
  flutter_launcher_icons: ^0.14.3
  printing: ^5.14.2
  url_launcher: ^6.1.0
  provider: ^6.1.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/
    - assets/texpilot_icon.png
    - assets/fonts/OpenSans-Regular.ttf

  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
          weight: 700

flutter_icons:
  android: true
  ios: true
  image_path: "assets/texpilot_icon.png"
